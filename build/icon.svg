<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#18181b"/>
      <stop offset="100%" stop-color="#27272a"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="inner" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1f2937"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect x="32" y="32" width="960" height="960" rx="220" ry="220" fill="url(#bg)" filter="url(#shadow)"/>

  <!-- Outer ring (poker chip style) -->
  <circle cx="512" cy="512" r="380" fill="none" stroke="url(#ring)" stroke-width="28" opacity="0.9"/>

  <!-- Chip notches -->
  <g stroke="#10b981" stroke-width="18" stroke-linecap="round" opacity="0.6">
    <line x1="512" y1="108" x2="512" y2="158"/>
    <line x1="512" y1="866" x2="512" y2="916"/>
    <line x1="108" y1="512" x2="158" y2="512"/>
    <line x1="866" y1="512" x2="916" y2="512"/>
    <line x1="227" y1="227" x2="262" y2="262"/>
    <line x1="762" y1="762" x2="797" y2="797"/>
    <line x1="797" y1="227" x2="762" y2="262"/>
    <line x1="227" y1="797" x2="262" y2="762"/>
  </g>

  <!-- Inner circle -->
  <circle cx="512" cy="512" r="310" fill="url(#inner)" stroke="#374151" stroke-width="3"/>

  <!-- Suits in 4 corners of the inner circle -->
  <!-- Spade (top) -->
  <g transform="translate(512, 270)" fill="#a1a1aa" opacity="0.4">
    <path d="M0,-28 C0,-28 -22,0 -22,14 C-22,22 -16,28 -8,28 C-3,28 0,25 0,25 C0,25 3,28 8,28 C16,28 22,22 22,14 C22,0 0,-28 0,-28 Z M-4,28 L4,28 L2,40 L-2,40 Z" transform="scale(0.9)"/>
  </g>
  <!-- Heart (right) -->
  <g transform="translate(750, 512)" fill="#dc2626" opacity="0.4">
    <path d="M0,10 C0,10 -24,-8 -24,-20 C-24,-28 -18,-32 -12,-32 C-6,-32 0,-24 0,-24 C0,-24 6,-32 12,-32 C18,-32 24,-28 24,-20 C24,-8 0,10 0,10 Z" transform="scale(0.9)"/>
  </g>
  <!-- Diamond (bottom) -->
  <g transform="translate(512, 750)" fill="#2563eb" opacity="0.4">
    <path d="M0,-28 L18,0 L0,28 L-18,0 Z" transform="scale(0.9)"/>
  </g>
  <!-- Club (left) -->
  <g transform="translate(274, 512)" fill="#16a34a" opacity="0.4">
    <path d="M0,-20 C-6,-20 -12,-14 -12,-8 C-12,-2 -6,4 0,4 C-10,4 -18,10 -18,18 C-18,26 -12,30 -6,30 C0,30 4,26 4,20 L4,34 L-4,34 L-4,20 C-4,26 0,30 6,30 C12,30 18,26 18,18 C18,10 10,4 0,4 C6,4 12,-2 12,-8 C12,-14 6,-20 0,-20 Z" transform="scale(0.8)"/>
  </g>

  <!-- Main "E" letter -->
  <g filter="url(#glow)">
    <text x="512" y="560" text-anchor="middle" font-family="SF Pro Display, Helvetica Neue, Arial, sans-serif" font-weight="800" font-size="320" fill="#10b981" letter-spacing="-10">E</text>
  </g>

  <!-- "=" sign for equity -->
  <g opacity="0.7">
    <rect x="390" y="610" width="120" height="16" rx="8" fill="#10b981"/>
    <rect x="390" y="640" width="120" height="16" rx="8" fill="#10b981"/>
  </g>

  <!-- Small "%" -->
  <text x="540" y="660" font-family="SF Pro Display, Helvetica Neue, Arial, sans-serif" font-weight="700" font-size="60" fill="#10b981" opacity="0.7">%</text>
</svg>
